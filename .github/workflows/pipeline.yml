name: CI/CD Pipeline - TFG ASIR

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Se autentica en DockerHub
      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Construye la imagen y la sube a DockerHub
      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tfg-app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tfg-app:latest

      # 4. Instala kubectl en el runner
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3

      # 5. Instala Helm en el runner
      - name: Instalar Helm
        uses: azure/setup-helm@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # 6. Configura el acceso al clúster de Minikube
      - name: Configurar kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml

      # 7. Despliega en Kubernetes con Helm
      - name: Desplegar con Helm
        run: |
          helm upgrade --install tfg-app ./helm/tfg-app \
            --kubeconfig kubeconfig.yaml \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/tfg-app \
            --wait

